spring.application.name=youthconnect_id

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/youthconnectdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.transaction.coordinator_class=jdbc

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework.beans.factory=DEBUG

# ============================================
# EMAIL CONFIGURATION - Gmail
# ============================================

# Gmail SMTP Settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:youthconnect538@gmail.com}
# Gmail App Password (16 characters, no spaces)
# Get it from: https://myaccount.google.com/apppasswords
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Sender email (your Gmail address)
spring.mail.properties.mail.smtp.from=${MAIL_USERNAME:youthconnect538@gmail.com}

# Enable debug logging for email
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG

# Application URL for email links
app.base.url=${APP_BASE_URL:http://localhost:4200}
