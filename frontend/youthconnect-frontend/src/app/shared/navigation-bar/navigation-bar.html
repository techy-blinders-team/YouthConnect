<header class="header">
    <div class="logo" (click)="scrollToTop()">
        <img src="assets/sk-logo-eclipse.png">
        <img src="assets/barangay-logo.png">
        <img src="assets/youthconnect-logo.png" alt="YouthConnect Logo" />
    </div>
    
    <button class="hamburger" [class.active]="isMenuOpen" (click)="toggleMenu()" aria-label="Toggle menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </button>
    
    <nav class="nav-menu" [class.active]="isMenuOpen">
        <a (click)="handleNavClick('home')" class="nav-link">Home</a>
        <a (click)="handleNavClick('/about')" class="nav-link">About</a>
        <a (click)="handleNavClick('/projects')" class="nav-link">Projects</a>
        <a (click)="handleNavClick('/leaders')" class="nav-link">Leaders</a>
        <a (click)="handleNavClick('/login')" class="nav-link">Login</a>
    </nav>
</header>
