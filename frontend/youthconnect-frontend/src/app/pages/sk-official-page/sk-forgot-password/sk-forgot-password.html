<div class="forgot-password-container">
    <div class="forgot-password-modal">
        <div class="forgot-password-header">
            <img src="assets/login page/youthconnect-logo.svg" alt="YouthConnect Logo" class="logo youthconnect-logo">
            <img src="assets/login page/sk-logo.svg" alt="SK Logo" class="logo sk-logo">
        </div>

        <h2 class="forgot-password-title">Forgot Password?</h2>
        <p class="forgot-password-subtitle">Enter your email address and we'll send you a link to reset your password
        </p>

        <form (ngSubmit)="onSubmit()" class="forgot-password-form">
            <!-- Success Message -->
            <div *ngIf="successMessage" class="success-message">
                {{ successMessage }}
            </div>

            <!-- Error Message -->
            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <!-- Email Input -->
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your SK official email"
                    [disabled]="isLoading" class="form-input" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-submit" [disabled]="isLoading || !email">
                {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
            </button>

            <!-- Back to Login -->
            <div class="back-to-login">
                <a routerLink="/sk-official-login">← Back to SK Login</a>
            </div>
        </form>
    </div>
</div>
