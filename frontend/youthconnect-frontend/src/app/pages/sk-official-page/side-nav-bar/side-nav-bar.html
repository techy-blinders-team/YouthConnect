<div class="mobile-top-bar">
	<button class="mobile-menu-toggle" (click)="toggleMobileMenu()" aria-label="Toggle menu">
		<span class="hamburger-line"></span>
		<span class="hamburger-line"></span>
		<span class="hamburger-line"></span>
	</button>
	<span class="mobile-top-bar-title">YouthConnect</span>
</div>

<div class="side-nav-bar" [class.mobile-open]="isMobileMenuOpen">
	<div class="mobile-overlay" (click)="closeMobileMenu()"></div>
	<div class="sidebar-content">
		<div class="sidebar-header">
			<img src="../../assets/youthconnect-logo.png" alt="YouthConnect Logo" class="logo-img">
			<h1 class="logo-text">YouthConnect</h1>
			<button class="mobile-close-btn" (click)="closeMobileMenu()" aria-label="Close menu">✕</button>
		</div>
		<ul>
			<li><a routerLink="/sk-official/dashboard" routerLinkActive="active" (click)="closeMobileMenu()"><img src="../../assets/sk-official-side-bar-icons/dashboard.svg" alt="Dashboard Icon" class="sidebar-icon">Dashboard</a></li>
			<li><a routerLink="/sk-official/events" routerLinkActive="active" (click)="closeMobileMenu()"><img src="../../assets/sk-official-side-bar-icons/events.svg" alt="Events Icon" class="sidebar-icon">Events</a></li>
			<li><a routerLink="/sk-official/concerns" routerLinkActive="active" (click)="closeMobileMenu()"><img src="../../assets/sk-official-side-bar-icons/concerns.svg" alt="Concerns Icon" class="sidebar-icon">Concerns</a></li>
			<li><a routerLink="/sk-official/task-tracker" routerLinkActive="active" (click)="closeMobileMenu()"><img src="../../assets/sk-official-side-bar-icons/task-tracker.svg" alt="Tasks Tracker Icon" class="sidebar-icon">Task Tracker</a></li>
			<li><a routerLink="/sk-official/youth-profiling" routerLinkActive="active" (click)="closeMobileMenu()"><img src="../../assets/sk-official-side-bar-icons/youth-profiling.svg" alt="Youth Profiling Icon" class="sidebar-icon">Youth Profiling</a></li>
		</ul>
		<div class="logout-section">
			<button (click)="logout()" [disabled]="isLoggingOut" class="logout-btn"><span class="logout-text">Logout</span></button>
		</div>
	</div>
</div>

@if (isLoggingOut) {
	<div class="modal-overlay">
		<div class="modal-content">
			<div class="spinner"></div>
			<h3 class="modal-title">Logging out...</h3>
		</div>
	</div>
}
