<div class="events-root">
    <div class="events-container">
        <!-- Header Section -->
        <div class="header-section">
            <div class="header-content">
                <h1>EVENTS</h1>
                <p>Create and manage all upcoming events</p>
            </div>
            <div class="user-profile">
                <div class="profile-badge">
                    <span class="initials">SK</span>
                </div>
                <div class="profile-info">
                    <p class="name">Full Name</p>
                    <p class="position">Position</p>
                </div>
            </div>
        </div>

        <!-- Search Bar and Add Event Button -->
        <div class="action-bar">
            <div class="search-group">
                <input type="text" placeholder="Search events by title, description, or location" class="search-input">
                <button class="search-btn">Search</button>
            </div>
            <button class="add-event-btn">+ Add Event</button>
        </div>
        <!-- Event Card -->
        <div class="events-list">
            <div class="event-card">
                <div class="card-header">
                    <h3>Event Name</h3>
                    <div class="card-actions">
                        <button class="edit-btn">
                            <img src="../../assets/sk-official-events-icons/edit.svg" alt="Edit" width="18" height="18">
                        </button>
                        <button class="delete-btn">
                            <img src="../../assets/sk-official-events-icons/delete.svg" alt="Delete" width="18" height="18">
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <p class="description">Event Description</p>
                    <div class="event-meta">
                        <div class="meta-item">
                            <span class="icon"><img src="../../assets/sk-official-events-icons/location.svg" alt="Location" width="16" height="16"></span>
                            <span>Location</span>
                        </div>
                        <div class="meta-item">
                            <span class="icon"><img src="../../assets/sk-official-events-icons/time.svg" alt="Time" width="16" height="16"></span>
                            <span>Date & Time</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="status-btn ongoing">Ongoing</button>
                    <button class="status-btn completed">Completed</button>
                </div>
            </div>
        </div>
    </div>
</div>
