<div class="events-root">
    <div class="events-container">
        <!-- Header Section -->
        <div class="header-section">
            <div class="header-content">
                <h1>EVENTS</h1>
                <p>Create and manage all upcoming events</p>
            </div>
            <div class="user-profile">
                <div class="profile-badge">
                    <span class="initials">SK</span>
                </div>
                <div class="profile-info">
                    <p class="name">Full Name</p>
                    <p class="position">Position</p>
                </div>
            </div>
        </div>

        <!-- Search Bar and Add Event Button -->
        <div class="action-bar">
            <div class="search-group">
                <input type="text" placeholder="Search events by title, description, or location" class="search-input">
                <button class="search-btn">Search</button>
            </div>
            <button class="add-event-btn" (click)="openModal()">+ Add Event</button>
        </div>
        <!-- Event Card -->
        <div class="events-list">
            <div class="event-card">
                <div class="card-header">
                    <h3>Event Name</h3>
                    <div class="card-actions">
                        <button class="edit-btn">
                            <img src="../../assets/sk-official-events-icons/edit.svg" alt="Edit" width="18" height="18">
                        </button>
                        <button class="delete-btn">
                            <img src="../../assets/sk-official-events-icons/delete.svg" alt="Delete" width="18" height="18">
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <p class="description">Event Description</p>
                    <div class="event-meta">
                        <div class="meta-item">
                            <span class="icon"><img src="../../assets/sk-official-events-icons/location.svg" alt="Location" width="16" height="16"></span>
                            <span>Location</span>
                        </div>
                        <div class="meta-item">
                            <span class="icon"><img src="../../assets/sk-official-events-icons/time.svg" alt="Time" width="16" height="16"></span>
                            <span>Date & Time</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="status-btn ongoing">Ongoing</button>
                    <button class="status-btn completed">Completed</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Event Modal -->
    <div class="modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title">Create New Event</h2>
                    <p class="modal-subtitle">Set up and publish a new event for participants to join</p>
                </div>
                <button class="close-btn" (click)="closeModal()">✕</button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label for="eventTitle" class="form-label">Event Title<span class="required">*</span></label>
                    <input type="text" id="eventTitle" class="form-input" placeholder="Enter event title">
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">Description<span class="required">*</span></label>
                    <textarea id="description" class="form-textarea" placeholder="Enter event description" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label for="dateTime" class="form-label">Date & Time<span class="required">*</span></label>
                    <input type="datetime-local" id="dateTime" class="form-input">
                </div>

                <div class="form-group">
                    <label for="location" class="form-label">Location<span class="required">*</span></label>
                    <input type="text" id="location" class="form-input" placeholder="Enter event location">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-cancel" (click)="closeModal()">Cancel</button>
                <button class="btn-create" (click)="createEvent()">Create Event</button>
            </div>
        </div>
    </div>
</div>
