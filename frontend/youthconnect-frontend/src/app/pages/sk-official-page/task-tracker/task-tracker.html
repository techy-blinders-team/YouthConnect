<div class="tasks-root">
    <div class="tasks-container">

        <!-- Header Section -->
        <div class="header-section">
            <div class="header-content">
                <h1>TASK TRACKER</h1>
                <p>Create and manage your tasks</p>
            </div>
            <div class="user-profile">
                <div class="profile-badge">
                    <span class="initials">SK</span>
                </div>
                <div class="profile-info">
                    <p class="name">Full Name</p>
                    <p class="position">Position</p>
                </div>
            </div>
        </div>

        <!-- Search Bar and Add Task Button -->
        <div class="action-bar">
            <div class="search-group">
                <input type="text" placeholder="Search tasks by title or description" class="search-input">
                <button class="search-btn">Search</button>
            </div>
            <button class="add-task-btn" (click)="openModal()">+ Add Task</button>
        </div>

        <!-- Tasks List -->
        <div class="tasks-list">
            <div class="task-card">
                <div class="card-header">
                    <h3>Tasking/Committee</h3>
                    <div class="card-actions">
                        <button class="edit-btn">
                            <img src="../../assets/sk-official-events-icons/edit.svg" alt="Edit" width="18" height="18">
                        </button>
                        <button class="delete-btn">
                            <img src="../../assets/sk-official-events-icons/delete.svg" alt="Delete" width="18" height="18">
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <p class="description">Description of task</p>
                    <div class="task-meta">
                        <div class="meta-item">
                            <span class="label">SK In-charge:</span>
                            <span class="value">SK name</span>
                        </div>
                        <div class="meta-item">
                            <span class="label">Note/Hyperlink:</span>
                            <span class="value">Note or Hyperlink</span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="action-btn task-status">In Progress</button>
                    <button class="action-btn task-status completed">Completed</button>
                </div>
            </div>
        </div>
        
    </div>
</div>
