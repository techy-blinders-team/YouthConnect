<div class="event-container">
    <div class="event-content">
        <div class="event-header">
            <h1>Upcoming Events, RSVP now</h1>
            <p class="subtitle">Discover and explore all events created by administrators</p>
        </div>

        <div class="events-list">
            <div class="event-card" *ngFor="let event of events" [ngClass]="'event-' + event.color">
                <div class="event-info">
                    <h3>{{ event.title }}</h3>
                    <p>{{ event.description }}</p>
                </div>
                <button class="btn-rsvp" [class.confirmed]="event.rsvpStatus === 'confirmed'" (click)="rsvpEvent(event)"
                    [disabled]="event.rsvpStatus === 'confirmed'">
                    {{ event.rsvpStatus === 'confirmed' ? 'Confirmed' : 'RSVP' }}
                </button>
            </div>
        </div>
    </div>

    <!-- RSVP Confirmation Modal -->
    <div class="modal-overlay" *ngIf="showRsvpModal" (click)="closeRsvpModal()">
        <div class="modal-content rsvp-modal" (click)="$event.stopPropagation()">
            <button class="btn-close-x" (click)="closeRsvpModal()" aria-label="Close modal">X</button>

            <div class="rsvp-modal-body">
                <div class="checkmark-icon">
                    <img src="assets/event/checklist.png" alt="Success" />
                </div>
                <h2>Thank you for RSVP, See you there on the Event!</h2>
            </div>
        </div>
    </div>
</div>
