<!-- Mobile Top Bar (shown only on mobile) -->
<div class="mobile-top-bar">
    <button class="mobile-menu-toggle" (click)="toggleMobileMenu()" aria-label="Toggle menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </button>
    <span class="mobile-top-bar-title">YouthConnect</span>
</div>

<!-- Sidebar -->
<div class="side-nav-bar" [class.mobile-open]="isMobileMenuOpen">
    <div class="mobile-overlay" (click)="closeMobileMenu()"></div>
    <div class="sidebar-content">
        <div class="sidebar-header">
            <img src="assets/sk-logo.png" alt="Youth Portal Logo" class="logo-img">
            <h1 class="logo-text">YouthConnect</h1>
            <button class="mobile-close-btn" (click)="closeMobileMenu()" aria-label="Close menu">✕</button>
        </div>
        <ul>
            <li>
                <a routerLink="/youth/dashboard" routerLinkActive="active" (click)="closeMobileMenu()">
                    <img src="assets/youth-sidebar/dashboard.png" alt="Dashboard Icon" class="sidebar-icon">
                    Dashboard
                </a>
            </li>
            <li>
                <a routerLink="/youth/create-concern" routerLinkActive="active" (click)="closeMobileMenu()">
                    <img src="assets/youth-sidebar/attention.png" alt="Concern Icon" class="sidebar-icon">
                    Concern
                </a>
            </li>
            <li>
                <a routerLink="/youth/events" routerLinkActive="active" (click)="closeMobileMenu()">
                    <img src="assets/youth-sidebar/event.png" alt="Event Icon" class="sidebar-icon">
                    Event
                </a>
            </li>
            <li class="notification-menu-item">
                <a routerLink="/youth/notifications" routerLinkActive="active" (click)="closeMobileMenu()">
                    <img src="assets/youth-sidebar/notification.png" alt="Notification Icon" class="sidebar-icon">
                    Notification
                    <span class="notification-badge" *ngIf="unreadNotificationCount > 0">
                        {{ unreadNotificationCount > 99 ? '99+' : unreadNotificationCount }}
                    </span>
                </a>
            </li>
        </ul>
        <div class="logout-section">
            <button (click)="logout()" [disabled]="isLoggingOut" class="logout-btn">
                <span class="logout-text">Logout</span>
            </button>
        </div>
    </div>
</div>

@if (isLoggingOut) {
<div class="modal-overlay">
    <div class="modal-content">
        <div class="spinner"></div>
        <h3 class="modal-title">Logging out...</h3>
    </div>
</div>
}
