<div class="carousel-container" [style.backgroundImage]="currentBackgroundImage">
  <div class="carousel-overlay"></div>
   <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">YouthConnect</h1>
            <p class="hero-subtitle">A Centralized Web System for Youth Engagement and Sangguniaang Kabataan Governance</p>

            <div class="cta-buttons">
                <button class="btn-signup" (click)="navigateTo('/sign-up')">Sign Up</button>
                <button class="btn-login" (click)="navigateTo('/login')">Login</button>
            </div>
        </div>
    </section>

  <div class="carousel-dots">
    @for (set of backgroundImages; track set; let i = $index) {
        <span 
            class="dot"
            [class.active]="i === currentImageIndex"
            (click)="goToImage(i)"
            [title]="'Go to set ' + (i + 1)">
        </span>
    }
  </div>
</div>
