<div class="login-container">
  <div class="login-modal">
    <!-- Back Button -->
    <button routerLink="/login" class="btn-back">
      <svg class="btn-back-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M19 12H5m7-7-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" fill="none" />
      </svg>
    </button>

    <!-- Header with Logos -->
    <div class="login-header">
      <img src="assets/login page/youthconnect-logo.svg" alt="YouthConnect Logo" class="logo youthconnect-logo">
      <img src="assets/login page/sk-logo.svg" alt="SK Logo" class="logo sk-logo">
    </div>

    <!-- Title -->
    <h2 class="login-title">Forgot Password</h2>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password</p>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Success Message -->
      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <!-- Email Input -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="Enter your email" class="form-input"
          [disabled]="isLoading" required>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-login" [disabled]="isLoading || !email">
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>
  </div>
</div>
