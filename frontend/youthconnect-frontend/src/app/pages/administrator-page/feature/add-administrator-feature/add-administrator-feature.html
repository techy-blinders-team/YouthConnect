@if (isOpen) {
	<div class="modal-backdrop" (click)="onBackdropClick($event)">
		<div class="modal">
			<div class="modal-header">
				<h3>Add New Administrator</h3>
			</div>

			<div class="modal-body">
				@if (errorMessage) {
					<p class="modal-error-message">{{ errorMessage }}</p>
				}

				<div class="form-group">
					<label for="add-admin-username">Username</label>
					<input
						id="add-admin-username"
						type="text"
						placeholder="Enter username"
						[(ngModel)]="newAdminForm.username"
						name="add-admin-username"
					/>
				</div>

				<div class="form-group">
					<label for="add-admin-email">Email</label>
					<input
						id="add-admin-email"
						type="email"
						placeholder="Enter email"
						[(ngModel)]="newAdminForm.email"
						name="add-admin-email"
					/>
				</div>

				<div class="form-group">
					<label for="add-admin-password">Password</label>
					<input
						id="add-admin-password"
						type="password"
						placeholder="Enter password"
						[(ngModel)]="newAdminForm.password"
						name="add-admin-password"
					/>
				</div>
			</div>

			<div class="modal-footer">
				<button
					type="button"
					class="btn btn-save"
					[disabled]="!isFormValid() || isSubmitting"
					(click)="submit()">
					{{ isSubmitting ? 'Saving...' : 'Save' }}
				</button>
				<button
					type="button"
					class="btn btn-cancel"
					[disabled]="isSubmitting"
					(click)="requestClose()">
					Cancel
				</button>
			</div>
		</div>
	</div>
}

@if (showConfirmationModal) {
	<div class="modal-backdrop">
		<div class="modal confirmation-modal">
			<div class="modal-body confirmation-body">
				<p>This will cancel your current progress. Will you continue?</p>
			</div>

			<div class="modal-footer">
				<button type="button" class="btn btn-yes" (click)="confirmClose()">Yes</button>
				<button type="button" class="btn btn-no" (click)="cancelClose()">No</button>
			</div>
		</div>
	</div>
}
