@if (isOpen) {
	<div class="modal-backdrop" (click)="onBackdropClick($event)">
		<div class="modal" (click)="$event.stopPropagation()">
			<div class="modal-header">
				<h3>Edit Youth Members</h3>
			</div>

			<div class="modal-body">
				@if (errorMessage) {
					<p class="modal-error-message">{{ errorMessage }}</p>
				}

				<div class="two-column-row">
					<div class="form-group">
						<label for="edit-youth-first-name">First Name</label>
						<input
							id="edit-youth-first-name"
							type="text"
							[(ngModel)]="editYouthMemberForm.firstName"
							name="edit-youth-first-name"
						/>
					</div>

					<div class="form-group">
						<label for="edit-youth-last-name">Last Name</label>
						<input
							id="edit-youth-last-name"
							type="text"
							[(ngModel)]="editYouthMemberForm.lastName"
							name="edit-youth-last-name"
						/>
					</div>
				</div>

				<div class="form-group">
					<label for="edit-youth-email">Email</label>
					<input
						id="edit-youth-email"
						type="email"
						[(ngModel)]="editYouthMemberForm.email"
						name="edit-youth-email"
					/>
				</div>

				<div class="form-group select-narrow">
					<label for="edit-youth-gender">Gender</label>
					<select
						id="edit-youth-gender"
						[(ngModel)]="editYouthMemberForm.gender"
						name="edit-youth-gender">
						@for (gender of genders; track gender) {
							<option [ngValue]="gender">{{ getGenderLabel(gender) }}</option>
						}
					</select>
				</div>

				<div class="form-group">
					<label for="edit-youth-birthday">Birthday</label>
					<input
						id="edit-youth-birthday"
						type="date"
						[(ngModel)]="editYouthMemberForm.birthday"
						name="edit-youth-birthday"
					/>
				</div>

				<div class="form-group">
					<label for="edit-youth-contact-number">Contact Number</label>
					<input
						id="edit-youth-contact-number"
						type="text"
						[(ngModel)]="editYouthMemberForm.contactNumber"
						name="edit-youth-contact-number"
					/>
				</div>

				<div class="form-group select-narrow">
					<label for="edit-youth-civil-status">Civil Status</label>
					<select
						id="edit-youth-civil-status"
						[(ngModel)]="editYouthMemberForm.civilStatus"
						name="edit-youth-civil-status">
						@for (status of civilStatuses; track status) {
							<option [ngValue]="status">{{ getCivilStatusLabel(status) }}</option>
						}
					</select>
				</div>
			</div>

			<div class="modal-footer">
				<button
					type="button"
					class="btn btn-save"
					[disabled]="!isFormValid() || !hasFormChanges() || isSubmitting"
					(click)="submit()">
					{{ isSubmitting ? 'Saving...' : 'Save' }}
				</button>
				<button
					type="button"
					class="btn btn-cancel"
					[disabled]="isSubmitting"
					(click)="requestClose()">
					Cancel
				</button>
			</div>
		</div>
	</div>
}

@if (showConfirmationModal) {
	<div class="modal-backdrop">
		<div class="modal confirmation-modal">
			<div class="modal-body confirmation-body">
				<p>This will cancel your current progress. Will you continue?</p>
			</div>

			<div class="modal-footer">
				<button type="button" class="btn btn-yes" (click)="confirmClose()">Yes</button>
				<button type="button" class="btn btn-no" (click)="cancelClose()">No</button>
			</div>
		</div>
	</div>
}
