<div class="parent">
    <div class="left">
        <div class="content-container">
           <div class="child-1">
                <img src="../../../assets/yc-logo.png"
                        alt="YouthConnect Logo"
                        class="youthconnect-logo">
                <img src="../../../assets/sk-logo.png"
                        alt="Sangguniang Kabataan"
                        class="sk-logo">
           </div>
           <div class="child-2">YouthConnect</div>
           <div class="child-3">
                a centralized digital platform for the SK officials of Barangay 183.
            </div>
        </div>
    </div>
    
    <div class="right">
        <form class="login-container">
            <img
                src="../../../assets/yc-logo.png"
                alt="YouthConnect Logo"
                class="login-logo">

            <label for="email">Email</label>
            <input
                id="email"
                type="email"
                placeholder="Enter your email"
                required>

            <label for="password">Password</label>
            <input
                id="password"
                type="password"
                placeholder="Enter your password"
                required>

            <button type="submit">Login</button>
        </form>
    </div>
</div>
