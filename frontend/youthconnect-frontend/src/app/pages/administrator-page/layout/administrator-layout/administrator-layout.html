<div class="admin-layout" [class.mobile-sidebar-open]="isSidebarOpen">
	<button
		type="button"
		class="mobile-menu-toggle"
		[class.is-open]="isSidebarOpen"
		aria-label="Open navigation"
		[attr.aria-expanded]="isSidebarOpen"
		(click)="toggleSidebar()"
	>
		<span class="menu-line"></span>
		<span class="menu-line"></span>
		<span class="menu-line"></span>
	</button>
	<div class="mobile-sidebar-backdrop" (click)="closeSidebar()"></div>
	<app-administrator-sidebar (navigate)="closeSidebar()"></app-administrator-sidebar>
	<div class="admin-content" (click)="closeSidebar()">
		<router-outlet></router-outlet>
	</div>
</div>
