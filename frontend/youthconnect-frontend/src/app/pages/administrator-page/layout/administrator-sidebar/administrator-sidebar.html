<div class="sidebar-container">
    <div class="side-header">
        <img src="assets/youthconnect-logo.png" alt="YouthConnect Logo" class="logo" />
        <div class="system-title">
            <span>System</span><br />
            <span>Management</span>
        </div>
    </div>
    <div class="side-menu">
        <ul>
            <li routerLink="/admin/dashboard">
                <img src="assets/administrator-sidebar/dashboard-icon.png"
                        alt="Dashboard"
                        class="menu-icon" />
                <span>Dashboard</span>
            </li>
            <li routerLink="/admin/manage-administrator">
                <img src="assets/administrator-sidebar/administrator-icon.png"
                        alt="Administrators"
                        class="administrator-icon" />
                <span class="administrator-text">Administrators</span>
            </li>
            <li routerLink="/admin/manage-sk-official">
                <img src="assets/administrator-sidebar/sk-icon.png"
                        alt="SK Officials"
                        class="sk-icon" />
                <span class="sk-text">SK Officials</span>
            </li>
            <li routerLink="/admin/manage-youth-member">
                <img src="assets/administrator-sidebar/youth-member-icon.png"
                        alt="Youth Members"
                        class="youth-member-icon" />
                <span class="youth-member-text">Youth Members</span>
            </li>
            <li routerLink="/admin/backup-restore">
                <img src="assets/administrator-sidebar/backup-and-restore-icon.png"
                        alt="Backup and Restore"
                        class="backup-restore-icon" />
                <span class="backup-restore-text">Backup/Restore</span>
            </li>
            <li routerLink="/admin/system-control">
                <img src="assets/administrator-sidebar/system-control-icon.png"
                        alt="System Control"
                        class="system-control-icon" />
                <span>System Control</span>
            </li>
        </ul>
    </div>
    <div class="side-footer">
        <div class="user-email">
            <img src="assets/administrator-sidebar/youth-member-icon.png" 
                    alt="User"
                    class="footer-icon" />
            <span class="email-text" [attr.title]="(adminInfo$ | async)?.email || null">{{ (adminInfo$ | async)?.email }}</span>
        </div>
        <button type="button" class="logout-btn" aria-label="Logout" (click)="logout()">
            <img src="assets/administrator-sidebar/logout-icon.png"
                    alt="Logout"
                    class="footer-logout-icon" />
        </button>
    </div>
</div>
